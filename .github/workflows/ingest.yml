name: Ingest Articles

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      RUN_JOBS: "0"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ wipe problematic google namespace packages that cause "unknown location"
      - name: Clean conflicting google packages
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y google google-cloud || true
          pip uninstall -y google-cloud-storage google-cloud-firestore google-cloud-core || true
          pip uninstall -y grpcio googleapis-common-protos || true

      - name: Install deps
        run: |
          pip install -r ingestor/requirements.txt

      # ✅ quick sanity check before running your script
      - name: Verify google-cloud-storage import
        run: |
          python -c "import google; import google.cloud; from google.cloud import storage; print('OK:', storage.__file__)"

      - name: Create Google credentials file (from secret)
        shell: bash
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ]; then
            echo "SECRET EMPTY: GOOGLE_APPLICATION_CREDENTIALS_JSON"
            exit 1
          fi

          python - <<'PY'
          import os, pathlib
          p = pathlib.Path(os.environ["RUNNER_TEMP"]) / "gcp.json"
          p.write_text(os.environ["GOOGLE_APPLICATION_CREDENTIALS_JSON"], encoding="utf-8")
          print("CREDS WRITTEN:", p)
          PY

          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/gcp.json" >> "$GITHUB_ENV"

      - name: Run ingest
        run: |
          python ingestor/main.py

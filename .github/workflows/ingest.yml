name: Ingest Articles

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      RUN_JOBS: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Debug - show commit + file header
        run: |
          echo "HEAD COMMIT:"
          git rev-parse HEAD
          echo "---- first 80 lines of ingestor/main.py ----"
          sed -n '1,80p' ingestor/main.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ingestor/requirements.txt

      - name: Create GCP credentials file (from secret)
        run: |
          CREDS_FILE="${RUNNER_TEMP}/gcp-sa.json"
          printf '%s' "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" > "${CREDS_FILE}"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${CREDS_FILE}" >> $GITHUB_ENV
          echo "Wrote creds to ${CREDS_FILE}"
          python -c "import os, json; p=os.environ.get('GOOGLE_APPLICATION_CREDENTIALS'); print('Creds path:', p); print('Has JSON keys:', list(json.load(open(p)).keys())[:5])"

      - name: Run ingestion
        run: |
          python ingestor/main.py

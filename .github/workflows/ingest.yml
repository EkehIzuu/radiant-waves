name: Ingest Articles

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      RUN_JOBS: "0"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip

          # ✅ Common fix: remove the bad "google" package if it exists
          python -m pip uninstall -y google || true

          # Install your deps
          pip install -r ingestor/requirements.txt

          # ✅ Ensure storage lib exists (even if you forgot it in requirements.txt)
          pip install -U google-cloud-storage google-cloud-core

      - name: Debug google-cloud-storage import
        run: |
          python -m pip show google-cloud-storage || true
          python -m pip show google || true
          python -m pip show google-cloud-core || true

          python - <<'PY'
          import sys
          print("python:", sys.version)

          try:
            from google.cloud import storage
            print("✅ OK: imported google.cloud.storage")
            print("storage module:", storage)
          except Exception as e:
            print("❌ IMPORT FAILED:", repr(e))
            import google
            print("google module path:", getattr(google, "__file__", "namespace/no file"))
            raise
          PY

      - name: Create Google credentials file (from secret)
        shell: bash
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ]; then
            echo "SECRET EMPTY: GOOGLE_APPLICATION_CREDENTIALS_JSON"
            exit 1
          fi

          python - <<'PY'
          import os, pathlib
          p = pathlib.Path(os.environ["RUNNER_TEMP"]) / "gcp.json"
          p.write_text(os.environ["GOOGLE_APPLICATION_CREDENTIALS_JSON"], encoding="utf-8")
          print("CREDS WRITTEN:", p)
          PY

          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/gcp.json" >> "$GITHUB_ENV"

      - name: Run ingest
        run: |
          python ingestor/main.py

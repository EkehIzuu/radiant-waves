name: Ingest Articles

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      RUN_JOBS: "0"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ Catch the #1 silent killer: local google/ or google.py shadowing the real package
      - name: Check for local google shadowing
        shell: bash
        run: |
          echo "=== Searching for local 'google' that can shadow imports ==="
          find . -maxdepth 4 -type d -name "google" -print || true
          find . -maxdepth 6 -type f -name "google.py" -print || true
          echo "==========================================================="

      - name: Install deps (clean google namespace)
        run: |
          python -m pip install --upgrade pip

          # ✅ remove known troublemakers if they exist
          python -m pip uninstall -y google google-cloud || true

          # Install project deps
          pip install -r ingestor/requirements.txt

          # ✅ force ensure storage is present
          pip install -U google-cloud-storage google-cloud-core

          # show installed google-cloud packages
          python -m pip freeze | grep -E "google|grpc" || true

      - name: Verify storage import (hard debug)
        run: |
          python - <<'PY'
          import pkgutil, sys
          print("Python:", sys.version)

          import google
          print("google module:", google)
          print("google.__file__:", getattr(google, "__file__", None))
          print("google.__path__:", list(getattr(google, "__path__", [])))

          # list what's inside google.cloud
          import google.cloud
          print("google.cloud:", google.cloud)
          print("google.cloud.__path__:", list(getattr(google.cloud, "__path__", [])))

          print("Available under google.cloud:")
          mods = sorted([m.name for m in pkgutil.iter_modules(google.cloud.__path__)])
          print(mods[:50], "... total:", len(mods))

          # the real test
          from google.cloud import storage
          print("✅ SUCCESS: google.cloud.storage imported:", storage)
          PY

      - name: Create Google credentials file (from secret)
        shell: bash
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ]; then
            echo "SECRET EMPTY: GOOGLE_APPLICATION_CREDENTIALS_JSON"
            exit 1
          fi

          python - <<'PY'
          import os, pathlib
          p = pathlib.Path(os.environ["RUNNER_TEMP"]) / "gcp.json"
          p.write_text(os.environ["GOOGLE_APPLICATION_CREDENTIALS_JSON"], encoding="utf-8")
          print("CREDS WRITTEN:", p)
          PY

          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/gcp.json" >> "$GITHUB_ENV"

      - name: Run ingest
        run: |
          python ingestor/main.py

name: SEO Build (Sitemap + SEO pages + IndexNow)

on:
  workflow_dispatch:
  schedule:
    # every 6 hours
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: seo-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          npm init -y
          npm i firebase-admin

      - name: Build SEO pages
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIRESTORE_COLLECTION: "articles"
        run: node tools/build-seo-pages.js

      - name: Commit generated files
        run: |
          git config user.name "rw-seo-bot"
          git config user.email "rw-seo-bot@users.noreply.github.com"

          git add sitemap.xml rss.xml robots.txt news/ || true

          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update sitemap + SEO pages"
          git push

      - name: Ping IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          HOST: "radiant-waves.com.ng"
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "Missing secret: INDEXNOW_KEY"
            exit 1
          fi

          curl -s "https://api.indexnow.org/indexnow?url=https://$HOST/&key=$INDEXNOW_KEY" || true
          curl -s "https://api.indexnow.org/indexnow?url=https://$HOST/sitemap.xml&key=$INDEXNOW_KEY" || true

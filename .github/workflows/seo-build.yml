name: Build SEO pages + sitemap

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 */6 * * *" # every 6 hours

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm init -y && npm i firebase-admin

      - name: Build SEO pages
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIRESTORE_COLLECTION: "articles"
        run: node tools/build-seo-pages.js

      - name: Commit generated files
        run: |
          git config user.name "rw-seo-bot"
          git config user.email "rw-seo-bot@users.noreply.github.com"
          git add sitemap.xml rss.xml robots.txt news/ || true
          git commit -m "Update sitemap + SEO pages" || echo "No changes"
          git push

# Auto-post latest article to Telegram, optional Facebook, optional Instagram, optional X (Twitter) on a schedule.
# Runs every 6 hours. Ensure repo secrets are set (see DEPLOY.md).

name: Telegram → IG (Business Suite)

on:
  schedule:
    # Every 4 hours (UTC)
    - cron: "0 */4 * * *"
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Telegram → Instagram (no Firebase)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: node scripts/telegram-to-instagram.js

      - name: Save state.json back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # state.json is modified by the script; stash it so we can rebase cleanly
          git stash push -u -m "state" -- state.json || true
          git pull --rebase
          git stash pop || true
          git add state.json
          git diff --cached --quiet && echo "No state changes" && exit 0
          git commit -m "chore: update telegram state"
          git push

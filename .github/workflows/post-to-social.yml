# Posts one feed per run from snapshot (Telegram + optional Meta). Green only when Telegram succeeds.
# UTC rotation each hour: hour%3===0 → politics, ===1 → football, ===2 → celebrity (one post per hour).
name: Post to social (snapshot)

# One run at a time so social_state.json push/rebase races don't drop posted_urls.
concurrency:
  group: post-to-social-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    # Every hour at :00 UTC — feed chosen by scripts/post-to-social-snapshot.js (hour % 3)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      feed:
        description: "Which feed to post (auto = same as schedule, from UTC hour)"
        type: choice
        options:
          - auto
          - politics
          - football
          - celebrity
        default: auto

jobs:
  post:
    runs-on: ubuntu-latest
    # Prevent a stuck Meta/network step from running for hours (default job limit is very high).
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Post from snapshot
        env:
          # Manual run only; scheduled runs leave empty → script uses UTC hour %% 3
          SOCIAL_TARGET_FEED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.feed || '' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          # Optional: full URL to gzipped snapshot JSON. If unset, script uses:
          # https://raw.githubusercontent.com/$GITHUB_REPOSITORY/$SNAPSHOT_REF|GITHUB_REF_NAME/snapshots/latest.json.gz
          SNAPSHOT_URL: ${{ vars.SNAPSHOT_URL }}
          # Optional: branch name for raw URL (default: GITHUB_REF_NAME, e.g. main)
          SNAPSHOT_REF: ${{ vars.SNAPSHOT_REF }}
          SITE_URL: ${{ vars.SITE_URL }}
          SHORTEN_LINK: ${{ vars.SHORTEN_LINK }}
          # Set to 1 to use Radiant reader URL in captions instead of the source article URL.
          SOCIAL_USE_SITE_ARTICLE_LINK: ${{ vars.SOCIAL_USE_SITE_ARTICLE_LINK }}
          # Default 1 when variable unset (repo root / Actions). Set var to 0 to disable.
          # Optional: POST_TO_FACEBOOK_LINK_PREVIEW=1 enables link-preview fallback (may show site logo).
          POST_TO_FACEBOOK_LINK_PREVIEW: ${{ vars.POST_TO_FACEBOOK_LINK_PREVIEW }}
          POST_TO_FACEBOOK: ${{ vars.POST_TO_FACEBOOK || '1' }}
          POST_TO_INSTAGRAM: ${{ vars.POST_TO_INSTAGRAM || '1' }}
          POST_TO_IG_STORY: ${{ vars.POST_TO_IG_STORY || '1' }}
          POST_TO_FACEBOOK_STORY: ${{ vars.POST_TO_FACEBOOK_STORY || '1' }}
          BITLY_ACCESS_TOKEN: ${{ secrets.BITLY_ACCESS_TOKEN }}
          # Strongly recommended for Instagram feed + story (public HTTPS image URL).
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: node scripts/post-to-social-snapshot.js

      - name: Save social state back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # social_state.json may be modified by script; stash to rebase cleanly
          git stash push -u -m "state" -- social_state.json || true
          git pull --rebase
          git stash pop || true
          git add social_state.json
          git diff --cached --quiet && echo "No state changes" && exit 0
          git commit -m "chore: update social snapshot state"
          git push

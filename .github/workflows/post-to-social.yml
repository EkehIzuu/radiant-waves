# Auto-post latest article to Telegram + IG, with optional FB and IG Story.
name: Post to social

on:
  schedule:
    # Every 3 hours 30 minutes (UTC)
    - cron: "0 */7 * * *"
    - cron: "30 3-23/7 * * *"
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Post latest article to Telegram + IG
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          # Optional toggles via repo Variables
          SHORTEN_LINK: ${{ vars.SHORTEN_LINK }}
          POST_TO_FACEBOOK: ${{ vars.POST_TO_FACEBOOK }}
          POST_TO_FACEBOOK_STORY: ${{ vars.POST_TO_FACEBOOK_STORY }}
          POST_TO_IG_STORY: ${{ vars.POST_TO_IG_STORY }}
          FAIL_IF_NOTHING_POSTED: ${{ vars.FAIL_IF_NOTHING_POSTED }}
          FAIL_IF_INSTAGRAM_FAIL: ${{ vars.FAIL_IF_INSTAGRAM_FAIL }}
        run: node scripts/post-to-social.js
